[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "config.Settings.dev"
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]

[tool.ruff]
line-length = 88
target-version = "py313"

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = ["E501"]

[tool.ruff.lint.isort]
known-first-party = ["core", "users", "accounts", "billing", "catalog", "projects", "plans", "estimating"]
