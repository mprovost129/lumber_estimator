{% extends 'base.html' %}

{% block title %}Log In{% endblock %}

{% block content %}
<div class="auth-card">
    <h1><i class="bi bi-rulers"></i> Log In</h1>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary w-100">Log In</button>
    </form>

    <p class="mt-3 mb-0"><a href="{% url 'password_reset' %}">Forgot your password?</a></p>
</div>
{% endblock %}
