{% extends 'base.html' %}

{% block title %}Reset Password{% endblock %}

{% block content %}
<div class="auth-card">
    <h1>Reset Password</h1>
    <p class="project-card-meta">Enter your email address and we'll send you a link to reset your password.</p>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary w-100">Send Reset Email</button>
    </form>
</div>
{% endblock %}
