{% extends 'base.html' %}

{% block title %}Enter New Password{% endblock %}

{% block content %}
<div class="auth-card">
    <h1>Enter New Password</h1>

    {% if validlink %}
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary w-100">Set New Password</button>
    </form>
    {% else %}
    <p class="mb-0">This password reset link is invalid or has expired. <a href="{% url 'password_reset' %}">Request a new one.</a></p>
    {% endif %}
</div>
{% endblock %}
